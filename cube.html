<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background-color: #000;
            color: #fff;
            font-family: "Arial Black", sans-serif;
            width: 640px;
            height: 128px;
            overflow: hidden;
            display: flex;
        }
        .container { display: flex; width: 640px; height: 128px; }
        .panel {
            width: 128px; height: 128px;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
            border-right: 1px solid #333; position: relative;
        }
        .label { font-size: 18px; color: #00FF00; position: absolute; top: 10px; font-weight: bold; }
        .value { font-size: 50px; font-weight: 900; line-height: 1; margin-top: 10px; }
        .unit { font-size: 16px; color: #888; }
        
        /* 振動パネルの色 */
        .vib-label { color: #FF00FF; }
    </style>
</head>
<body>
    <div class="container">
        <!-- 騒音面 -->
        <div class="panel">
            <div class="label">騒音</div>
            <div class="value" id="n-val">--</div>
            <div class="unit">dB</div>
        </div>
        <!-- 振動面 -->
        <div class="panel">
            <div class="label vib-label">振動</div>
            <div class="value" id="v-val">--</div>
            <div class="unit">dB</div>
        </div>
        
        <!-- 他の面は以前と同じ（またはiframeで現場サイトを埋め込み） -->
        <div id="extra-panels" style="display:flex;">
             <div class="panel"><div class="value" style="font-size:20px;">LOADING</div></div>
        </div>
    </div>

    <script>
        // 現場のサイトから数値を直接抽出する関数
        async function fetchRealtimeData() {
            const targetUrl = "https://www2.edam.ne.jp/Public/00642/Sokutei/SSC/RN?LoId=738";
            
            try {
                // CORS回避のためにプロキシサービス（allorigins等）を経由して取得
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent(targetUrl)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                
                // HTML文字列から数値を抽出
                const parser = new DOMParser();
                const doc = parser.parseFromString(data.contents, 'text/html');
                
                const noise = doc.getElementById('cur_souon')?.textContent || "--";
                const vib = doc.getElementById('cur_shindou')?.textContent || "--";

                document.getElementById('n-val').innerText = noise;
                document.getElementById('v-val').innerText = vib;

            } catch (e) {
                console.error("データ取得エラー", e);
            }
        }

        // 3秒ごとに実行
        setInterval(fetchRealtimeData, 3000);
        fetchRealtimeData();
    </script>
</body>
</html>
