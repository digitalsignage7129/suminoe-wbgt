<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住之江区 WBGT & 天気</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin: 10px auto; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #wbgt-val { font-size: 3rem; font-weight: bold; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>住之江区 暑さ指数（WBGT）</h1>

    <div class="card">
        <h2>現在の推定WBGT</h2>
        <div id="wbgt-val">--</div>
        <div id="wbgt-status" class="status-badge">取得中...</div>
    </div>

    <div class="card">
        <canvas id="weatherChart"></canvas>
    </div>

 <script>
    // 通信を安定させるためのプロキシ経由
    const JMA_URL = "https://api.allorigins.win/raw?url=" + encodeURIComponent("https://www.jma.go.jp/bosai/forecast/data/forecast/270000.json");

    async function updateWeather() {
        const wbgtVal = document.getElementById('wbgt-val');
        const badge = document.getElementById('wbgt-status');

        try {
            const response = await fetch(JMA_URL);
            const data = await response.json();
            
            // 1. 気温データが入っている場所（timeSeries）を特定する
            // 多くの場合は data[0].timeSeries[2] ですが、念のため中身を確認しながら探します
            const tempSeries = data[0].timeSeries.find(s => s.areas[0].temps);
            
            if (!tempSeries) throw new Error('気温データが見つかりません');

            // 2. その中から「大阪市」のデータだけを抽出する
            const osakaData = tempSeries.areas.find(a => a.area.name === "大阪市");
            
            if (!osakaData) throw new Error('大阪市のエリアが見つかりません');

            const temps = osakaData.temps;
            // 空文字や undefined を除外して、有効な数値だけを取得
            const validTemps = temps.filter(t => t !== "" && t !== undefined);
            const currentTemp = parseFloat(validTemps[0]);

            if (isNaN(currentTemp)) {
                wbgtVal.innerText = "取得中";
            } else {
                // 気温からWBGTを推定 (係数 0.73 + 2.4 は環境省の簡易換算に近い数値です)
                const estimatedWBGT = (currentTemp * 0.73 + 2.4).toFixed(1);
                wbgtVal.innerText = `${estimatedWBGT}℃`;
                updateBadge(estimatedWBGT);
                drawChart(validTemps);
            }

        } catch (e) {
            console.error("エラー詳細:", e);
            wbgtVal.innerText = "ERR";
            badge.innerText = "再試行中...";
        }
    }

    function updateBadge(val) {
        const badge = document.getElementById('wbgt-status');
        if (val >= 31) { badge.innerText = "危険 (外出は控えて)"; badge.style.backgroundColor = "#ff0000"; }
        else if (val >= 28) { badge.innerText = "厳重警戒"; badge.style.backgroundColor = "#ff9900"; }
        else if (val >= 25) { badge.innerText = "警戒"; badge.style.backgroundColor = "#ffd700"; badge.style.color = "black"; }
        else { badge.innerText = "ほぼ安全"; badge.style.backgroundColor = "#00b0f0"; }
    }

    function drawChart(temps) {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        if (window.myChart) { window.myChart.destroy(); }
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: temps.map((_, i) => i === 0 ? "今" : i === 1 ? "次" : "先"),
                datasets: [{ 
                    label: '予想気温 (℃)', 
                    data: temps, 
                    borderColor: '#ff6384', 
                    borderWidth: 3,
                    fill: false,
                    tension: 0.3
                }]
            },
            options: {
                scales: { y: { suggestedMin: 15, suggestedMax: 35 } }
            }
        });
    }

    // 起動時に実行
    updateWeather();
</script>
