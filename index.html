<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住之江区 WBGT監視 (Black Edition)</title>
    <style>
        /* 背景黒・文字白の固定設定 */
        body {
            background-color: #000000;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            font-family: "Arial Black", "Helvetica Neue", sans-serif;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            width: 98%;
            height: 95%;
            /* 焼き付き防止：1pxだけゆっくり動かす */
            animation: shift 60s infinite linear;
        }

        .location { font-size: 6vw; }

        .wbgt-section { text-align: center; width: 100%; }
        .wbgt-label { font-size: 7vw; margin-bottom: -1vh; color: #AAAAAA; }
        .wbgt-value { font-size: 38vw; line-height: 1; }
        .unit { font-size: 10vw; }

        /* 判定ラベル */
        .status-box {
            width: 92%;
            padding: 2vh 0;
            border-radius: 12px;
            font-size: 14vw;
            text-align: center;
            border: 4px solid #FFFFFF;
        }

        /* 判定別カラー（文字は黒にして可読性を確保） */
        .status-danger { background-color: #FF0000; color: #000; }
        .status-severe { background-color: #FF8C00; color: #000; }
        .status-warning { background-color: #FFD700; color: #000; }
        .status-caution { background-color: #ADFF2F; color: #000; }
        .status-safe { background-color: #00FF7F; color: #000; }

        .weather-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            font-size: 8vw;
            border-top: 2px solid #444;
            padding-top: 2vh;
        }

        @keyframes shift {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="location">大阪市 住之江付近</div>
        
        <div class="wbgt-section">
            <div class="wbgt-label">暑さ指数(WBGT)</div>
            <div class="wbgt-value" id="wbgt-val">--.-<span class="unit">℃</span></div>
        </div>

        <div id="status-box" class="status-box">取得中</div>

        <div class="weather-info">
            <div>気温:<span id="temp">--</span>℃</div>
            <div>湿度:<span id="humi">--</span>%</div>
            <div>風速:<span id="wind">--</span>m</div>
        </div>
    </div>

    <script>
        // 以前作成したJSONファイルの名前を指定
        const JSON_URL = './weather_data.json';

        async function updateData() {
            try {
                // キャッシュを避けるためにタイムスタンプを付与
                const response = await fetch(JSON_URL + '?t=' + new Date().getTime());
                const data = await response.json();

                // JSON内のキー名（以前のPythonの設計に合わせています）
                const wbgt = parseFloat(data.wbgt);
                const temp = parseFloat(data.temp);
                const humi = parseFloat(data.humi);
                const wind = parseFloat(data.wind);

                // 画面への反映
                document.getElementById('wbgt-val').innerHTML = wbgt.toFixed(1) + '<span class="unit">℃</span>';
                document.getElementById('temp').innerText = temp.toFixed(1);
                document.getElementById('humi').innerText = Math.round(humi);
                document.getElementById('wind').innerText = wind.toFixed(1);

                // 危険度判定
                const box = document.getElementById('status-box');
                if (wbgt >= 31) { 
                    box.innerText = "危険"; 
                    box.className = "status-box status-danger"; 
                } else if (wbgt >= 28) { 
                    box.innerText = "厳重警戒"; 
                    box.className = "status-box status-severe"; 
                } else if (wbgt >= 25) { 
                    box.innerText = "警戒"; 
                    box.className = "status-box status-warning"; 
                } else if (wbgt >= 21) { 
                    box.innerText = "注意"; 
                    box.className = "status-box status-caution"; 
                } else { 
                    box.innerText = "ほぼ安全"; 
                    box.className = "status-box status-safe"; 
                }

            } catch (e) {
                console.error("データ取得エラー:", e);
                document.getElementById('status-box').innerText = "データ更新中";
            }
        }

        updateData();
        // 10分ごとに更新を確認
        setInterval(updateData, 600000);
    </script>
</body>
</html>
