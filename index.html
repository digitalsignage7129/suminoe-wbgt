<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住之江区 WBGT監視</title>
    <style>
        body {
            background-color: #C0C0C0; /* 焼き付き防止：一段暗めのグレー */
            color: #000000;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        /* 1:4の細長画面に収めるためのグリッド */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            width: 98%;
            height: 96%;
            animation: shift 60s infinite linear; /* ピクセルシフト */
        }

        .location { font-size: 5vw; margin-top: 2vh; }
        
        /* WBGTメイン表示 */
        .wbgt-section { text-align: center; }
        .wbgt-label { font-size: 6vw; margin-bottom: -2vh; }
        .wbgt-value { font-size: 30vw; line-height: 1; }
        .unit { font-size: 8vw; }

        /* 判定ラベル */
        .status-box {
            width: 90%;
            padding: 1.5vh 0;
            border-radius: 10px;
            font-size: 10vw;
            text-align: center;
            border: 3px solid #000;
        }

        /* 気象データ（湿度・風速など） */
        .weather-info {
            display: flex;
            justify-content: space-around;
            width: 100%;
            font-size: 6vw;
            background: rgba(255,255,255,0.2);
            padding: 1vh 0;
            border-radius: 5px;
        }

        /* 判定別カラー */
        .status-danger { background-color: #FF0000; color: #fff; }
        .status-severe { background-color: #FF8C00; }
        .status-warning { background-color: #FFD700; }
        .status-caution { background-color: #ADFF2F; }
        .status-safe { background-color: #00FF7F; }

        @keyframes shift {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="location">大阪市 住之江</div>
        
        <div class="wbgt-section">
            <div class="wbgt-label">暑さ指数(WBGT)</div>
            <div class="wbgt-value" id="wbgt-val">--.-<span class="unit">℃</span></div>
        </div>

        <div id="status-box" class="status-box">取得中</div>

        <div class="weather-info">
            <div>気温:<span id="temp">--</span>℃</div>
            <div>湿度:<span id="humi">--</span>%</div>
            <div>風速:<span id="wind">--</span>m</div>
        </div>
    </div>

    <script>
        // 住之江（大阪）のCSV URL（以前成功したものに差し替えてください）
        const CSV_URL = '【ここに環境省のCSVのURLを入れてください】';

        async function updateData() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const lines = text.trim().split('\n');
                const lastLine = lines[lines.length - 1].split(',');

                // CSVの列：1:日時, 2:WBGT, 3:気温, 4:湿度, 5:風速（環境省形式）
                const wbgt = parseFloat(lastLine[1]);
                const temp = parseFloat(lastLine[2]);
                const humi = parseFloat(lastLine[3]);
                const wind = parseFloat(lastLine[4]);

                // 数値表示
                document.getElementById('wbgt-val').innerHTML = wbgt.toFixed(1) + '<span class="unit">℃</span>';
                document.getElementById('temp').innerText = temp.toFixed(1);
                document.getElementById('humi').innerText = humi;
                document.getElementById('wind').innerText = wind.toFixed(1);

                // 判定
                const box = document.getElementById('status-box');
                if (wbgt >= 31) { box.innerText = "危険"; box.className = "status-box status-danger"; }
                else if (wbgt >= 28) { box.innerText = "厳重警戒"; box.className = "status-box status-severe"; }
                else if (wbgt >= 25) { box.innerText = "警戒"; box.className = "status-box status-warning"; }
                else if (wbgt >= 21) { box.innerText = "注意"; box.className = "status-box status-caution"; }
                else { box.innerText = "ほぼ安全"; box.className = "status-box status-safe"; }

            } catch (e) {
                document.getElementById('status-box').innerText = "エラー";
            }
        }

        updateData();
        setInterval(updateData, 600000); // 10分更新
    </script>
</body>
</html>
