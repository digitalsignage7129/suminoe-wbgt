<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住之江区 WBGT監視 (Black Edition)</title>
    <style>
        body {
            background-color: #000000;
            color: #FFFFFF;
            margin: 0;
            padding: 0;
            font-family: "Arial Black", "Hiragino Sans", sans-serif;
            font-weight: 900;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }

        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            width: 98%;
            height: 98%;
            animation: shift 60s infinite linear;
        }

        .wbgt-section { text-align: center; width: 100%; }
        .wbgt-label { font-size: 6vw; color: #AAAAAA; }
        .wbgt-value { font-size: 38vw; line-height: 0.8; margin: 1vh 0; }
        .unit-large { font-size: 10vw; }

        .status-box {
            width: 95%;
            padding: 1.5vh 0;
            border-radius: 10px;
            font-size: 14vw;
            text-align: center;
            border: 4px solid #FFFFFF;
        }

        /* 気象情報のレイアウト改善 */
        .weather-grid {
            display: flex;
            flex-direction: column; /* 情報を縦に積み上げる */
            width: 95%;
            border-top: 2px solid #444;
            padding-top: 1vh;
        }

        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 1vh;
        }

        .info-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            flex: 1;
        }

        .info-label { font-size: 4vw; color: #AAAAAA; }
        .info-data { font-size: 7vw; text-align: center; white-space: nowrap; overflow: hidden; }

        /* 天気などの長い文章用 */
        .full-width-item {
            width: 100%;
            text-align: center;
            border-top: 1px solid #333;
            padding-top: 0.5vh;
        }

        .status-danger { background-color: #FF0000; color: #000; }
        .status-severe { background-color: #FF8C00; color: #000; }
        .status-warning { background-color: #FFD700; color: #000; }
        .status-caution { background-color: #ADFF2F; color: #000; }
        .status-safe { background-color: #00FF7F; color: #000; }

        @keyframes shift {
            0%, 100% { transform: translate(0,0); }
            50% { transform: translate(1px, 1px); }
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="wbgt-section">
            <div class="wbgt-label">暑さ指数</div>
            <div class="wbgt-value" id="wbgt-val">--.-<span class="unit-large">℃</span></div>
        </div>

        <div id="status-box" class="status-box">取得中</div>

        <div class="weather-grid">
            <div class="info-row">
                <div class="info-item">
                    <div class="info-label">気温</div>
                    <div class="info-data"><span id="temp">--</span>℃</div>
                </div>
                <div class="info-item" style="border-left: 1px solid #333;">
                    <div class="info-label">風向き</div>
                    <div class="info-data" id="wind-short">--</div>
                </div>
            </div>
            <div class="full-width-item">
                <div class="info-label">天気</div>
                <div class="info-data" id="weather-text" style="font-size: 5vw;">--</div>
            </div>
        </div>
    </div>

    <script>
        const JSON_URL = './weather_data.json';

        async function updateData() {
            try {
                const response = await fetch(JSON_URL + '?t=' + new Date().getTime());
                const data = await response.json();

                // WBGTと気温の表示
                const wbgt = parseFloat(data.wbgt);
                document.getElementById('wbgt-val').innerHTML = wbgt.toFixed(1) + '<span class="unit-large">℃</span>';
                document.getElementById('temp').innerText = data.temp;

                // 風速（文章の最初だけ切り出す）
                const windText = data.wind || "";
                document.getElementById('wind-short').innerText = windText.split('　')[0]; // 「西の風」など

                // 天気
                document.getElementById('weather-text').innerText = data.weather || "--";

                // 判定
                const box = document.getElementById('status-box');
                if (wbgt >= 31) { box.innerText = "危険"; box.className = "status-box status-danger"; }
                else if (wbgt >= 28) { box.innerText = "厳重警戒"; box.className = "status-box status-severe"; }
                else if (wbgt >= 25) { box.innerText = "警戒"; box.className = "status-box status-warning"; }
                else if (wbgt >= 21) { box.innerText = "注意"; box.className = "status-box status-caution"; }
                else { box.innerText = "ほぼ安全"; box.className = "status-box status-safe"; }

            } catch (e) {
                console.error(e);
                document.getElementById('status-box').innerText = "更新待機中";
            }
        }

        updateData();
        setInterval(updateData, 600000);
    </script>
</body>
</html>
