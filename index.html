<script>
    // 自分自身のリポジトリにあるJSONを読み込む（CORSエラー無し！）
    const DATA_URL = "./weather_data.json";

    async function updateWeather() {
        const wbgtVal = document.getElementById('wbgt-val');
        const badge = document.getElementById('wbgt-status');
        const debug = document.getElementById('debug-msg');

        try {
            debug.innerText = "データ読み込み中...";
            // キャッシュを避けるためにタイムスタンプを付与
            const response = await fetch(DATA_URL + '?t=' + f.getTime());
            if (!response.ok) throw new Error('JSONファイルが見つかりません');
            
            const data = await response.json();
            
            if (data.status === "err") throw new Error(data.msg);

            const temps = data.temps;
            const currentTemp = parseFloat(temps[0]);
            
            // 推定WBGT計算
            const wbgt = (currentTemp * 0.73 + 2.4).toFixed(1);

            wbgtVal.innerText = wbgt + "℃";
            updateStatus(wbgt);
            drawChart(temps);
            
            // 最終更新時間はPython側から取得
            debug.innerText = "データ更新ID: " + data.updated;

        } catch (e) {
            console.error(e);
            wbgtVal.innerText = "ERR";
            badge.innerText = "データ待機中";
            debug.innerText = "エラー: " + e.message + " (自動更新を待ってください)";
        }
    }

    // --- (updateStatus と drawChart は前回と同じ) ---
    function updateStatus(val) {
        const badge = document.getElementById('wbgt-status');
        const display = document.getElementById('wbgt-val');
        if (val >= 31) { badge.innerText = "危険"; badge.style.backgroundColor = "#ff0000"; display.style.color = "#ff0000"; }
        else if (val >= 28) { badge.innerText = "厳重警戒"; badge.style.backgroundColor = "#ff9900"; display.style.color = "#ff9900"; }
        else if (val >= 25) { badge.innerText = "警戒"; badge.style.backgroundColor = "#ffd700"; badge.style.color = "black"; display.style.color = "#ffd700"; }
        else { badge.innerText = "ほぼ安全"; badge.style.backgroundColor = "#00b0f0"; display.style.color = "#00b0f0"; }
    }

    function drawChart(temps) {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        if (window.myChart) window.myChart.destroy();
        Chart.defaults.color = '#fff';
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: temps.map((_, i) => ["今日", "今夜", "明日", "明後日"][i] || ""),
                datasets: [{
                    label: '予想気温',
                    data: temps,
                    borderColor: '#ff6384',
                    backgroundColor: 'rgba(255,99,132,0.2)',
                    tension: 0.4,
                    fill: true
                }]
            },
            options: { plugins: { legend: { display: false } }, scales: { y: { grid: { color: '#444' } }, x: { grid: { color: '#444' } } } }
        });
    }

    updateWeather();
</script>
