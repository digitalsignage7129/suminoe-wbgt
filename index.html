<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>住之江区 WBGT</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background: #1a1a1a; color: white; text-align: center; font-family: sans-serif; }
        .card { background: #333; border-radius: 15px; padding: 20px; margin: 20px auto; max-width: 400px; }
        #wbgt-val { font-size: 4rem; font-weight: bold; }
        #status-msg { font-size: 1.5rem; margin-bottom: 10px; }
        #debug { font-size: 0.8rem; color: #888; margin-top: 20px; border-top: 1px solid #444; padding-top: 10px; }
    </style>
</head>
<body>

    <div class="card">
        <p>大阪市住之江区 WBGT推計</p>
        <div id="status-msg">読み込み中...</div>
        <div id="wbgt-val">--</div>
    </div>

    <div style="max-width: 400px; margin: auto;">
        <canvas id="myChart"></canvas>
    </div>

    <div id="debug">Initializing...</div>

    <script>
        async function loadData() {
            const valElem = document.getElementById('wbgt-val');
            const msgElem = document.getElementById('status-msg');
            const debugElem = document.getElementById('debug');

            try {
                debugElem.innerText = "Fetch開始...";
                // キャッシュ回避のため?t=を付ける
                const res = await fetch('./weather_data.json?t=' + Date.now());
                
                if (!res.ok) {
                    throw new Error("ファイルが見つかりません。Actionsが成功しているか確認してください。");
                }

                const data = await res.json();
                debugElem.innerText = "データ解析中...";

                if (data.status === "ok") {
                    const temp = parseFloat(data.temps[0]);
                    const wbgt = (temp * 0.73 + 2.4).toFixed(1);
                    
                    valElem.innerText = wbgt + "℃";
                    msgElem.innerText = wbgt >= 31 ? "【危険】" : wbgt >= 28 ? "【厳重警戒】" : "【注意】";
                    valElem.style.color = wbgt >= 28 ? "orange" : "cyan";
                    
                    debugElem.innerText = "更新成功: " + new Date().toLocaleTimeString();
                    showChart(data.temps);
                } else {
                    throw new Error("データエラー: " + data.msg);
                }

            } catch (e) {
                debugElem.innerText = "状況: " + e.message;
                valElem.innerText = "WAIT";
            }
        }

        function showChart(temps) {
            const ctx = document.getElementById('myChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: temps.map((_, i) => i),
                    datasets: [{ label: '気温', data: temps, borderColor: 'red' }]
                }
            });
        }

        loadData();
    </script>
</body>
</html>
