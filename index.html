<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住之江区 WBGT監視</title>
    <style>
        /* 1. 焼き付き防止と視認性を両立した背景色 */
        body {
            background-color: #D0D0D0; /* 真っ白を避け、反射を抑えるグレー */
            color: #000000;
            margin: 0;
            padding: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            font-weight: 900; /* 極太フォントで視認性を確保 */
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
            width: 100vw;
            overflow: hidden; /* 余白・スクロールを強制排除 */
        }

        /* 2. 1:4の細長い画面に最適化したレイアウト */
        .container {
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            align-items: center;
            width: 95%;
            height: 90%;
            text-align: center;
        }

        .location-name {
            font-size: 8vw; /* 地点名 */
            margin: 0;
        }

        .wbgt-value {
            font-size: 35vw; /* 数値を最大化 */
            line-height: 0.9;
            margin: -5vw 0;
        }

        .unit {
            font-size: 10vw;
            margin-left: 1vw;
        }

        /* 3. 色で危険度を伝えるラベル */
        .status-box {
            width: 90%;
            padding: 2vh 0;
            border-radius: 15px;
            font-size: 12vw;
            background-color: #888888; /* 初期色 */
            color: #000000;
            box-shadow: 0 0 20px rgba(0,0,0,0.2);
        }

        /* 危険度別カラー設定 */
        .status-danger { background-color: #FF0000; color: #FFFFFF; } /* 危険 */
        .status-severe { background-color: #FF8C00; } /* 厳重警戒 */
        .status-warning { background-color: #FFD700; } /* 警戒 */
        .status-caution { background-color: #ADFF2F; } /* 注意 */
        .status-safe { background-color: #00FF7F; }    /* ほぼ安全 */

        /* 4. ピクセルシフト（焼き付き防止の微細な動き） */
        @keyframes shift {
            0% { transform: translate(0,0); }
            25% { transform: translate(1px, 1px); }
            50% { transform: translate(-1px, 1px); }
            75% { transform: translate(-1px, -1px); }
            100% { transform: translate(0,0); }
        }
        .container { animation: shift 60s infinite linear; }
    </style>
</head>
<body>

    <div class="container">
        <div class="location-name">大阪市 住之江</div>
        <div class="wbgt-value" id="wbgt-val">--.-<span class="unit">℃</span></div>
        <div id="status-box" class="status-box">取得中...</div>
    </div>

    <script>
        // ※以前のコードで修正した正しいURLを使用してください
        const CSV_URL = '【ここに以前のCSV取得URLを入れてください】';

        async function updateWBGT() {
            try {
                const response = await fetch(CSV_URL);
                const text = await response.text();
                const rows = text.split('\n');
                
                // 最新の行からデータを抽出するロジック（前回のコードを流用）
                // ここでは仮に最新の値を28.5と想定して表示ロジックのみ記載します
                const val = 28.5; // 実際にはここをCSV解析データに書き換えてください
                
                const valElem = document.getElementById('wbgt-val');
                const boxElem = document.getElementById('status-box');

                valElem.innerHTML = val.toFixed(1) + '<span class="unit">℃</span>';

                // 危険度判定とデザイン変更
                if (val >= 31) {
                    boxElem.innerText = "危険";
                    boxElem.className = "status-box status-danger";
                } else if (val >= 28) {
                    boxElem.innerText = "厳重警戒";
                    boxElem.className = "status-box status-severe";
                } else if (val >= 25) {
                    boxElem.innerText = "警戒";
                    boxElem.className = "status-box status-warning";
                } else if (val >= 21) {
                    boxElem.innerText = "注意";
                    boxElem.className = "status-box status-caution";
                } else {
                    boxElem.innerText = "ほぼ安全";
                    boxElem.className = "status-box status-safe";
                }
            } catch (error) {
                console.error('データ取得失敗', error);
            }
        }

        updateWBGT();
        setInterval(updateWBGT, 600000); // 10分ごとに更新
    </script>
</body>
</html>
