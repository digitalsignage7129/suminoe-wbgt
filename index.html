<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>住之江区 WBGT & 天気</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f2f5; text-align: center; padding: 20px; }
        .card { background: white; border-radius: 15px; padding: 20px; margin: 10px auto; max-width: 500px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        #wbgt-val { font-size: 3rem; font-weight: bold; }
        .status-badge { display: inline-block; padding: 5px 15px; border-radius: 20px; color: white; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>住之江区 暑さ指数（WBGT）</h1>

    <div class="card">
        <h2>現在の推定WBGT</h2>
        <div id="wbgt-val">--</div>
        <div id="wbgt-status" class="status-badge">取得中...</div>
    </div>

    <div class="card">
        <canvas id="weatherChart"></canvas>
    </div>

   <script>
    const JMA_URL = "https://www.jma.go.jp/bosai/forecast/data/forecast/270000.json";

    async function updateWeather() {
        const wbgtVal = document.getElementById('wbgt-val');
        const badge = document.getElementById('wbgt-status');

        try {
            const response = await fetch(JMA_URL);
            if (!response.ok) throw new Error('データが取得できませんでした');
            const data = await response.json();
            
            // 大阪地方の時系列データを取得
            const timeSeries = data[0].timeSeries[2];
            // 大阪市のインデックスを探す（通常は0番目）
            const cityIndex = timeSeries.areas.findIndex(a => a.area.name === "大阪市");
            const temps = timeSeries.areas[cityIndex].temps;
            
            // 現在の気温を取得（一番近い予報値）
            const currentTemp = parseFloat(temps[0]);

            if (isNaN(currentTemp)) {
                wbgtVal.innerText = "確認中";
            } else {
                // 簡易WBGT計算（気温から算出）
                const estimatedWBGT = (currentTemp * 0.7 + 5).toFixed(1);
                wbgtVal.innerText = `${estimatedWBGT}℃`;
                updateBadge(estimatedWBGT);
                drawChart(temps);
            }

        } catch (e) {
            console.error(e);
            wbgtVal.innerText = "ERR";
            badge.innerText = "通信エラー";
            badge.style.backgroundColor = "gray";
        }
    }

    function updateBadge(val) {
        const badge = document.getElementById('wbgt-status');
        if (val >= 31) { badge.innerText = "危険"; badge.style.backgroundColor = "red"; }
        else if (val >= 28) { badge.innerText = "厳重警戒"; badge.style.backgroundColor = "orange"; }
        else if (val >= 25) { badge.innerText = "警戒"; badge.style.backgroundColor = "#ffd700"; badge.style.color = "black"; }
        else { badge.innerText = "注意"; badge.style.backgroundColor = "#00b0f0"; }
    }

    function drawChart(temps) {
        const ctx = document.getElementById('weatherChart').getContext('2d');
        // すでにグラフがある場合は破棄して再描画（二重表示防止）
        if (window.myChart) { window.myChart.destroy(); }
        window.myChart = new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['今日', '今夜', '明日'],
                datasets: [{ 
                    label: '予想気温 (℃)', 
                    data: temps, 
                    borderColor: '#ff6384', 
                    backgroundColor: 'rgba(255, 99, 132, 0.2)',
                    fill: true,
                    tension: 0.4
                }]
            },
            options: { responsive: true, scales: { y: { beginAtZero: false } } }
        });
    }

    updateWeather();
</script>
